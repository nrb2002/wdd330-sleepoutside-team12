<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Product Title</title>

    <link rel="stylesheet" href="../css/style.css" />

    <script src="../js/product.js" type="module"></script>
  </head>

  <body>
    <!-- Dynamic header -->
    <header class="divider" id="page-header"></header>

    <main class="divider">
      <section class="product-detail">
        <h3 id="product-title">Brand Name</h3>

        <h2 class="divider">Product</h2>

        <img
          class="divider"
          src="../public/images/camping-products.jpg"
          alt="Sleep Outside Products"
          id="product-img"
        />

        <p id="product-price" class="product-card__price">$0.00</p>
        
        <p id="product-discount" class="product-card__discount"></p>

        <p id="product-color" class="product__color">Color</p>

        <p id="product-description" class="product__description">Description</p>
        
        

        <div class="product-detail__add">
          <button id="addToCart" data-id="productId">Add to Cart</button>
        </div>
      </section>
    </main>

    <!-- Dynamic footer -->
    <footer id="page-footer"></footer>
  </body>
</html>
