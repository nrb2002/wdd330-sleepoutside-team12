<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/checkout.css" />

    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <!-- Dynamic header -->
    <header class="divider" id="page-header"></header>

    <main class="divider">
      <section class="checkout-grid">
        <!-- LEFT: FORM -->
        <div id="error-message" class="error-message"></div>

        <form id="checkout-form" class="checkout-form">
          <h3>Customer Information</h3>
          <fieldset>
            <legend>Personal Info</legend>

            <label
              >First Name
              <input type="text" name="fname" minlength="2" pattern="[A-Za-z\s]+" autocomplete="given-name" required />
            </label>

            <label
              >Last Name
              <input type="text" name="lname" minlength="2" pattern="[A-Za-z\s]+" autocomplete="family-name" required />
            </label>

            <label
              >Street Address
              <input type="text" name="street" autocomplete="address-line1" required />
            </label>

            <label
              >City
              <input type="text" name="city" autocomplete="address-line2" required />
            </label>

            <label
              >State
              <input type="text" name="state" required />
            </label>

            <label
              >Zip Code
              <input type="text" name="zip" pattern="[0-9]{4,10}" placeholder="Ex: 1234" required />
            </label>

            <label>
              Phone
              <input type="tel" name="phone" pattern="[0-9]{10}" placeholder="Ex: 0812345678" required />
            </label>

            <label>
              Email
              <input type="email" name="email" required />
            </label>
          </fieldset>

          <fieldset>
            <legend>Payment Info</legend>

            <label
              >Card Number
              <input type="text" name="cardNumber" pattern="[0-9]{16}" placeholder="Ex: 0123456789123456" required />
            </label>

            <label
              >Expiration Date
              <input
                type="text"
                name="expiration"
                placeholder="MM/YY"
                pattern="^(0[1-9]|1[0-2])\/\d{2}$"
                required
              />
            </label>

            <label
              >Security Code
              <input type="text" name="code" pattern="[0-9]{3,4}" placeholder="Ex: 123" required />
            </label>
          </fieldset>
          <button type="submit" class="checkout-submit">Place Order</button>
        </form>

        <!-- RIGHT: ORDER SUMMARY -->
        <div class="order-summary">
          <h3>Order Summary</h3>
          <hr />
          <p>Subtotal: <span id="subtotal">$0.00</span></p>
          <p>Tax: <span id="tax">$0.00</span></p>
          <p>Shipping: <span id="shipping">$0.00</span></p>
          <hr />

          <h2>Total: <span id="orderTotal">$0.00</span></h2>
        </div>
      </section>
    </main>

    <!-- Dynamic footer -->
    <footer id="page-footer"></footer>
  </body>
</html>
